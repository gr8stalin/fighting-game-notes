baseURL = 'https://gr8stalin.github.io/fighting-game-notes/'
locale = 'en-us'
title = 'Fighting Game Notes by Gr8Stalin'

[module]
    [[module.imports]]
        path = "github.com/colinwilson/lotusdocs"
        disable = false
    [[module.imports]]
        path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
        disable = false

[markup.goldmark.renderer]
    unsafe = true

[[menu.primary]]
    name  = "Docs"
    url = "/docs/"
    identifier = "docs"
    weight = 10

[params]

    [params.footer]
        copyright = "Built with [**Lotus Docs**](https://github.com/colinwilson/lotusdocs)"
        version = true
    
    [params.social]
        github = "https://github.com/gr8stalin/fighting-game-notes"
        twitter = "https://x.com/MustacheStalin"

    [params.docs]
        title = "Fighting Game Notes"
        darkMode = true
        repoUrl = "https://github.com/gr8stalin/fighting-game-notes"